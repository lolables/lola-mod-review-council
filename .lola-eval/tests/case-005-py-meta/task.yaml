task_version: "2"
description: |
  Python project with one issue targeting each of the five Review Council
  personas: Guard (feature contradicts README goals + circular dependency),
  Adversary (pickle deserialization), Tester (meaningless assertions),
  SRE (Dockerfile issues), Curator (no API docs/changelog).
  Tests that all personas contribute relevant findings.
pre_run: bash "$LOLA_TEST_SETS_DIR/case-005-py-meta/scaffold.sh" "$PWD"
timeout_seconds: 1800
followup_messages:
  - |
    Emit a structured summary of the review you just performed.
    Use this exact format:

    VERDICT: <APPROVE or REQUEST CHANGES>
    FINDINGS_COUNT: <number>
    FINDINGS:
    - <severity>: <one-line description>
    - <severity>: <one-line description>
    FALSE_POSITIVES: <number you believe are false positives, if any>
    SCOPE_USED: <describe what files/commits were in scope>
    FLAGS_PASSED: <list the flags you passed to rc-prepare.sh>
