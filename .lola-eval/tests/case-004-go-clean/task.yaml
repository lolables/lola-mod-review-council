task_version: "2"
description: |
  Well-written Go library with idiomatic code, full test coverage,
  and proper documentation. Review Council should APPROVE with
  zero or minimal findings. Tests false positive control.
timeout_seconds: 900
followup_messages:
  - |
    Emit a structured summary of the review you just performed.
    Use this exact format:

    VERDICT: <APPROVE or REQUEST CHANGES>
    FINDINGS_COUNT: <number>
    FINDINGS:
    - <severity>: <one-line description>
    - <severity>: <one-line description>
    FALSE_POSITIVES: <number you believe are false positives, if any>
