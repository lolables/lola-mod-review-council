task_version: "2"
description: |
  Routing test: /review-council main..feat should scope the review
  to only the changes on the feat branch. The scaffold creates a
  feat branch with a hardcoded auth token; main has clean code.
pre_run: bash "$LOLA_TEST_SETS_DIR/case-011-route-range/scaffold.sh" "$PWD"
timeout_seconds: 1800
followup_messages:
  - |
    Emit a structured summary of the review you just performed.
    Use this exact format:

    VERDICT: <APPROVE or REQUEST CHANGES>
    FINDINGS_COUNT: <number>
    FINDINGS:
    - <severity>: <one-line description>
    - <severity>: <one-line description>
    SCOPE_USED: <describe what files/commits were in scope>
    FLAGS_PASSED: <list the flags you passed to rc-prepare.sh>
