task_version: "2"
description: |
  Routing test: /review-council quick code HEAD should translate to
  --effort quick --mode code --scope range --scope-value "HEAD~1..HEAD".
  Tests that the "quick" token is extracted as an effort flag.
pre_run: bash "$LOLA_TEST_SETS_DIR/case-017-route-quick/scaffold.sh" "$PWD"
timeout_seconds: 1800
followup_messages:
  - |
    Emit a structured summary of the review you just performed.
    Use this exact format:

    VERDICT: <APPROVE or REQUEST CHANGES or SKIPPED>
    FINDINGS_COUNT: <number>
    FINDINGS:
    - <severity>: <one-line description>
    - <severity>: <one-line description>
    SCOPE_USED: <describe what files/commits were in scope>
    FLAGS_PASSED: <list the flags you passed to rc-prepare.sh>
