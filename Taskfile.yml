# Taskfile.yml — Review Council project automation
version: "3"

includes:
  lola-eval:
    taskfile: .taskfiles/lola-eval.yml

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null

  test:
    desc: Run module tests
    env:
      GIT_CONFIG_NOSYSTEM: "1"
      GIT_CONFIG_GLOBAL: /dev/null
      GIT_AUTHOR_NAME: Test
      GIT_AUTHOR_EMAIL: test@test.local
      GIT_COMMITTER_NAME: Test
      GIT_COMMITTER_EMAIL: test@test.local
    cmds:
      - bash module/tests/test-rc-prepare.sh
      - bash module/tests/test-rc-verify-evidence.sh
      - bash module/tests/test-rc-render-report.sh
