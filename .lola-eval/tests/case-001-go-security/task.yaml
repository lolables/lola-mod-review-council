task_version: "2"
description: |
  Go HTTP server with four intentional security flaws:
  SQL injection, hardcoded API key leaked in response,
  missing input validation, and command injection via
  unsanitized exec.Command. Review Council should detect
  all four through the adversary agent.
timeout_seconds: 1800
